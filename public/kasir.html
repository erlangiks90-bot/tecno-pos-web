<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kasir - TECNO POS</title><link rel="stylesheet" href="/style.css"></head><body class="kasir-page"><div class="app"><aside class="sidebar"><div class="brand"><img id="brandLogo" src="" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><div class="logo" style="display:none">TP</div><div><b id="brandName">TOKO</b><small>Kasir</small></div></div><button class="menu active" data-menu="kasir" onclick="show('kasir')">🧾 <span>Kasir</span></button><button class="menu" data-menu="riwayat" onclick="show('riwayat')">📄 <span>Riwayat</span></button><button class="menu" data-menu="tampilan" onclick="show('tampilan')">🎨 <span>Tampilan</span></button><button class="logout" onclick="logout()">⎋</button></aside><main class="main"><div class="top"><div><h1>Kasir</h1><p>Shortcut: F1 cari • F2 bayar • F3 simpan keranjang • F4 print • Esc kosongkan pencarian</p></div><div><b id="kasirName"></b> <button class="ghost" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button></div></div>
<section id="kasir" class="section active"><div class="kasir-layout"><div class="card"><div class="toolbar"><input id="search" placeholder="Cari / scan barcode barang..." autofocus><button class="primary" onclick="loadProducts()">Cari</button><button class="ghost" onclick="saveCart()">Simpan</button></div><div id="products" class="product-grid"></div></div><div class="card"><h2>Keranjang</h2><div id="cart"></div><div class="toolbar"><input id="member" placeholder="Nama member / pelanggan"><input id="diskon" type="number" placeholder="Diskon" value="0"></div><div class="total-box" id="total">Rp 0</div><div class="toolbar"><select id="metode"><option>TUNAI</option><option>QRIS</option><option>TRANSFER</option><option>UTANG</option></select><input id="bayar" type="number" placeholder="Bayar"></div><div class="pay-grid"><button class="primary" onclick="pay()">BAYAR</button><button class="ghost" onclick="printLast()">CETAK</button></div></div></div></section>
<section id="riwayat" class="section"><div class="card"><h2>Riwayat</h2><p>Setelah bayar, struk terakhir bisa dicetak ulang dari tombol CETAK.</p></div></section>
<section id="tampilan" class="section"><div class="card"><h2>Tampilan Kasir</h2><div class="toolbar"><button class="ghost" onclick="setTheme('light')">Mode Terang</button><button class="ghost" onclick="setTheme('dark')">Mode Gelap</button><button class="ghost" onclick="setTheme('eye')">Kenyamanan Mata</button></div><div class="toolbar"><button class="ghost" onclick="setTheme(localStorage.tp_mode||'eye','blue')">Biru</button><button class="ghost" onclick="setTheme(localStorage.tp_mode||'eye','green')">Hijau</button><button class="ghost" onclick="setTheme(localStorage.tp_mode||'eye','purple')">Ungu</button><button class="ghost" onclick="setTheme(localStorage.tp_mode||'eye','orange')">Orange</button><button class="ghost" onclick="setTheme(localStorage.tp_mode||'eye','black')">Hitam</button></div></div></section>
</main></div><div id="printArea" class="print-area"></div><script src="/app.js"></script><script>
loadSession();if(!API.user||API.user.role!=='kasir')location.href='/';initBrand();kasirName.textContent='Kasir: '+API.user.nama;let PRODUCTS=[],CART=JSON.parse(localStorage.getItem('tp_cart')||'[]'),LAST=null;loadProducts();renderCart();
search.oninput=()=>loadProducts();document.addEventListener('keydown',e=>{if(e.key==='F1'){e.preventDefault();search.focus()}if(e.key==='F2'){e.preventDefault();pay()}if(e.key==='F3'){e.preventDefault();saveCart()}if(e.key==='F4'){e.preventDefault();printLast()}if(e.key==='Escape'){search.value='';loadProducts()}});
async function loadProducts(){try{PRODUCTS=await api('/api/kasir/products?q='+encodeURIComponent(search.value||''));products.innerHTML=PRODUCTS.map(p=>`<div class="prod"><b>${p.nama}</b><small>${p.barcode||''} • ${p.kategori||''}</small><p>Stok: <b>${p.stok}</b> ${p.satuan}</p><h3>${rp(p.harga)}</h3><button class="primary" onclick="add(${p.id})">Tambah</button></div>`).join('')||'<p>Produk tidak ada</p>'}catch(e){products.innerHTML='<b>'+e.message+'</b>'}}
function add(id){const p=PRODUCTS.find(x=>x.id===id);if(!p)return;let c=CART.find(x=>x.id===id);if(c)c.qty++;else CART.push({id:p.id,nama:p.nama,harga:p.harga,modal:p.modal||0,qty:1});renderCart();saveCart(false)}
function renderCart(){cart.innerHTML=CART.map((c,i)=>`<div class="cart-row"><b>${c.nama}</b><input type="number" value="${c.qty}" min="1" onchange="CART[${i}].qty=Number(this.value);renderCart();saveCart(false)"><span>${rp(c.harga*c.qty)}</span><button onclick="CART.splice(${i},1);renderCart();saveCart(false)">×</button></div>`).join('')||'<p>Keranjang kosong</p>';const subtotal=CART.reduce((a,b)=>a+b.harga*b.qty,0);const t=subtotal-Number(diskon.value||0);total.textContent=rp(t);bayar.placeholder='Bayar '+rp(t)}
diskon.oninput=renderCart;function saveCart(msg=true){localStorage.setItem('tp_cart',JSON.stringify(CART));if(msg)alert('Keranjang disimpan')}
async function pay(){try{if(!CART.length)return alert('Keranjang kosong');const subtotal=CART.reduce((a,b)=>a+b.harga*b.qty,0);const t=subtotal-Number(diskon.value||0);const j=await api('/api/kasir/pay',{method:'POST',body:JSON.stringify({items:CART,metode:metode.value,bayar:Number(bayar.value||t),diskon:Number(diskon.value||0),member:member.value})});LAST=j;CART=[];saveCart(false);renderCart();await loadProducts();renderReceipt(j.transaksi,j.toko);window.print();alert('Transaksi berhasil')}catch(e){alert(e.message)}}
function renderReceipt(trx,toko){const lines=trx.items.map(i=>`<div><b>${i.nama}</b><br>${i.qty} x ${rp(i.harga)} <span style="float:right">${rp(i.qty*i.harga)}</span></div>`).join('<hr>');printArea.innerHTML=`<center><b>${toko.nama}</b><br><small>${toko.alamat||''}</small></center><hr>No: ${trx.no}<br>Kasir: ${trx.kasir}<br>Tgl: ${new Date(trx.created_at).toLocaleString('id-ID')}<hr>${lines}<hr>Subtotal <span style="float:right">${rp(trx.subtotal)}</span><br>Diskon <span style="float:right">${rp(trx.diskon)}</span><br><b>TOTAL <span style="float:right">${rp(trx.total)}</span></b><br>Bayar (${trx.metode}) <span style="float:right">${rp(trx.bayar)}</span><br>Kembali <span style="float:right">${rp(trx.kembali)}</span><hr><center>${toko.footer||'Terima kasih'}${toko.paket==='GRATIS'?'<br><small>Powered by Erlang Tecno</small>':''}</center>`}
async function printLast(){if(LAST){renderReceipt(LAST.transaksi,LAST.toko);window.print()}else alert('Belum ada struk terakhir')}
</script></body></html>
