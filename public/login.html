<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TECNO POS</title><link rel="stylesheet" href="/style.css"></head><body>
<div class="center"><form class="login-card" id="loginForm"><h1 class="brand-title">TECNO POS</h1><input id="username" autocomplete="username" placeholder="Username" required><div class="pass-wrap"><input id="password" type="password" autocomplete="current-password" placeholder="Password" required><button class="eye-btn" type="button" onclick="togglePassword()">👁</button></div><button class="btn primary" type="submit">LOGIN</button><div id="msg" class="error hidden"></div><div class="powered">Powered by Erlang Tecno</div></form></div>
<script>
const $=s=>document.querySelector(s);localStorage.removeItem('tecno_user');localStorage.removeItem('tecno_toko');
$('#loginForm').onsubmit=async e=>{e.preventDefault();$('#msg').classList.add('hidden');try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('#username').value.trim(),password:$('#password').value})});const j=await r.json();if(!j.ok)throw new Error(j.message);localStorage.setItem('tecno_user',JSON.stringify(j.user));localStorage.setItem('tecno_toko',JSON.stringify(j.toko||{}));location.href=j.user.role==='developer'?'/developer.html':j.user.role==='admin'?'/admin.html':'/kasir.html'}catch(err){$('#msg').textContent=err.message||'Login gagal';$('#msg').classList.remove('hidden')}};
function togglePassword(){const p=document.getElementById('password');p.type=p.type==='password'?'text':'password'}
</script></body></html>
