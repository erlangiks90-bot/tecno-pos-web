<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TECNO POS</title><link rel="stylesheet" href="/style.css"></head><body class="login-page"><div class="login-card"><h1>TECNO POS</h1><input id="username" placeholder="Username" autocomplete="username"><div class="pass"><input id="password" type="password" placeholder="Password"><button onclick="togglePass()">👁</button></div><button class="primary" onclick="login()">LOGIN</button><p>Powered by Erlang Tecno</p></div><script>
function togglePass(){password.type=password.type==='password'?'text':'password'}
async function login(){try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const j=await r.json();if(!r.ok)throw new Error(j.message);localStorage.setItem('tp_user',JSON.stringify(j.user));localStorage.setItem('tp_toko',JSON.stringify(j.toko||{}));if(j.user.role==='developer')location.href='/developer.html';else if(j.user.role==='admin')location.href='/admin.html';else location.href='/kasir.html'}catch(e){alert(e.message||'Login gagal')}}
</script></body></html>
